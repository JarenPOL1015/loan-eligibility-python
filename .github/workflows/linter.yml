name: Code Quality Enforcement

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Flake8 Linter Verification
      run: |
        # Este comando analizará el código. Si encuentra algún error de estilo,
        # detendrá el workflow e indicará un fallo en GitHub (enforcing 0 violations).
        flake8 src/loan/eligibility.py --count --show-source --statistics